<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="imagens/OIP-removebg-preview.png" type="image/png" />

  <title>Contato - JogPlay</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="bg-gradient min-vh-100 d-flex flex-column">
    <nav class="navbar navbar-expand-lg navbar-dark shadow navbar-vermelho">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <i class="bi bi-controller"></i> JogPlay
        </a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div id="navbarNav" class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
            <li class="nav-item"><a class="nav-link" href="ação.html">Ação</a></li>
            <li class="nav-item"><a class="nav-link" href="aventura.html">Aventura</a></li>
            <li class="nav-item"><a class="nav-link" href="rpg.html">RPG</a></li>
            <li class="nav-item"><a class="nav-link" href="corrida.html">Corrida</a></li>
            <li class="nav-item"><a class="nav-link active" href="contato.html">Contato</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container flex-grow-1 d-flex justify-content-center align-items-center py-5">
      <div class="card shadow p-4" style="max-width: 500px; width: 100%;">
        <h2 class="text-center mb-4 text-black">Fale Conosco</h2>
        <form>
          <div class="mb-3">
            <label for="nome" class="form-label text-black">Nome</label>
            <input type="text" class="form-control" id="nome" placeholder="Seu nome completo" required>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label text-black">Email</label>
            <input type="email" class="form-control" id="email" placeholder="seuemail@exemplo.com" required>
          </div>
          <div class="mb-3">
            <label for="assunto" class="form-label text-black">Assunto</label>
            <input type="text" class="form-control" id="assunto" placeholder="Motivo do contato" required>
          </div>
          <div class="mb-3">
            <label for="mensagem" class="form-label text-black">Mensagem</label>
            <textarea class="form-control" id="mensagem" rows="4" placeholder="Escreva sua mensagem aqui..." required></textarea>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-danger">Enviar</button>
          </div>
        </form>
      </div>
    </main>

    <footer class="text-white text-center p-3 footer-vermelho mt-auto">
      <p>&copy; 2026 JogPlay | Desenvolvido por Thaila Kruchelski.</p>
    </footer>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
